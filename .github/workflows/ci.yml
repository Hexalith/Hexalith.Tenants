name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *' # Nightly at 02:00 UTC — runs Performance tests

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # MinVer needs full history
          submodules: recursive

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        # global.json auto-detected for SDK version

      - name: Cache NuGet packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Unit Tests (Tier 1)
        run: |
          dotnet test tests/Hexalith.Tenants.Contracts.Tests/ --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"
          dotnet test tests/Hexalith.Tenants.Client.Tests/ --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"
          dotnet test tests/Hexalith.Tenants.Testing.Tests/ --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"
          dotnet test samples/Hexalith.Tenants.Sample.Tests/ --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"

      - name: Install DAPR CLI
        run: |
          wget -q https://raw.githubusercontent.com/dapr/cli/v1.16.0/install/install.sh -O - | /bin/bash
          dapr init

      - name: Integration Tests (Tier 2)
        run: >
          dotnet test
          tests/Hexalith.Tenants.Server.Tests/
          --no-build --configuration Release
          --logger "trx;LogFileName=integration-results.trx"
          --collect:"XPlat Code Coverage"

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-results
          path: |
            **/test-results.trx
            **/integration-results.trx

  aspire-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-and-test
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1

      - name: Cache NuGet packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: nuget-

      - name: Restore and Build
        run: dotnet build --configuration Release

      - name: Install DAPR CLI
        run: |
          wget -q https://raw.githubusercontent.com/dapr/cli/v1.16.0/install/install.sh -O - | /bin/bash
          dapr init # Full init (not --slim) for Aspire topology

      - name: Aspire Contract Tests (Tier 3, non-Performance)
        run: >
          dotnet test
          tests/Hexalith.Tenants.IntegrationTests/
          --no-build --configuration Release
          --filter "Category!=Performance"
          --logger "trx;LogFileName=aspire-results.trx"
          --collect:"XPlat Code Coverage"

      - name: Test Summary
        if: always()
        run: |
          echo "## Tier 3 Aspire Contract Tests" >> $GITHUB_STEP_SUMMARY
          echo "Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: aspire-test-results
          path: |
            **/aspire-results.trx
            **/coverage.cobertura.xml

  performance-tests:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: build-and-test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1

      - name: Cache NuGet packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: nuget-

      - name: Restore and Build
        run: dotnet build --configuration Release

      - name: Install DAPR CLI
        run: |
          wget -q https://raw.githubusercontent.com/dapr/cli/v1.16.0/install/install.sh -O - | /bin/bash
          dapr init

      - name: Performance Tests (Tier 3, nightly only)
        run: >
          dotnet test
          tests/Hexalith.Tenants.IntegrationTests/
          --no-build --configuration Release
          --filter "Category=Performance"
          --logger "trx;LogFileName=perf-results.trx"

      - name: Upload performance test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: performance-test-results
          path: "**/perf-results.trx"
