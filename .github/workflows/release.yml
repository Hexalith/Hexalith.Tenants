name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          submodules: recursive
          persist-credentials: false

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 'lts/*'

      - name: Cache NuGet packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: nuget-

      - name: Install npm dependencies
        run: npm ci

      - name: Restore
        run: dotnet restore

      - name: Run Tests (Tier 1 + 2)
        run: |
          dotnet test tests/Hexalith.Tenants.Contracts.Tests/ --no-restore --configuration Release --logger "trx;LogFileName=contracts-results.trx" --collect:"XPlat Code Coverage"
          dotnet test tests/Hexalith.Tenants.Client.Tests/ --no-restore --configuration Release --logger "trx;LogFileName=client-results.trx" --collect:"XPlat Code Coverage"
          dotnet test tests/Hexalith.Tenants.Testing.Tests/ --no-restore --configuration Release --logger "trx;LogFileName=testing-results.trx" --collect:"XPlat Code Coverage"
          dotnet test samples/Hexalith.Tenants.Sample.Tests/ --no-restore --configuration Release --logger "trx;LogFileName=sample-results.trx" --collect:"XPlat Code Coverage"
          dotnet test tests/Hexalith.Tenants.Server.Tests/ --no-restore --configuration Release --logger "trx;LogFileName=server-results.trx" --collect:"XPlat Code Coverage"

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: npx semantic-release
