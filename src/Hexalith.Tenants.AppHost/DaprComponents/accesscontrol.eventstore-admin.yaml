# DAPR Access Control Configuration for the Admin.Server sidecar
# ================================================================================
# This Configuration CRD is loaded ONLY by the eventstore-admin sidecar and therefore
# governs which CALLERS may invoke Admin.Server through Dapr service invocation.
#
# In the current topology no other service should directly invoke eventstore-admin.
# Admin.Server is an HTTP-facing host that delegates to EventStore, not a Dapr
# service target for peer workloads.
apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: accesscontrol-eventstore-admin
spec:
  accessControl:
    defaultAction: allow  # Allow-by-default in self-hosted mode; change to deny with mTLS
    trustDomain: "public"
    policies: []
